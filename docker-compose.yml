services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: livraria
      POSTGRES_PASSWORD: livraria123
      POSTGRES_DB: livraria
    ports:
      - "5433:5432"
    volumes:
      - dados_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U livraria -d livraria"]
      interval: 3s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    environment:
      DATABASE_URL: "postgresql://livraria:livraria123@db:5432/livraria?schema=public"
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  dados_postgres: